name: Package Cross-Platform App
on: 
  workflow_dispatch:

jobs:
  package:
    strategy:
      fail-fast: false # Prevents one OS failure from instantly canceling the others
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
            artifact: linux-package
          - os: macos-latest
            platform: darwin
            artifact: mac-package
          - os: windows-latest
            platform: windows
            artifact: windows-package

    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Ensures full git history is pulled to prevent git 128 errors

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
          cache: false # Bypasses the tar exit code 2 cache corruption issue

      # Linux only: Install GTK/Webkit dependencies
      - name: Install Linux Dependencies
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y gcc libgtk-3-dev libwebkit2gtk-4.1-dev

      - name: Install Wails v3
        run: go install -v github.com/wailsapp/wails/v3/cmd/wails3@v3.0.0-alpha.77

      - name: Package Application
        continue-on-error: true
        run: wails3 task package PLATFORM=${{ matrix.platform }} CONFIG=production

      - name: Upload Package
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: bin/